<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cfc"/>
      <stop offset="100%" stop-color="#4a2cb8"/>
    </linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4d4dc"/>
      <stop offset="100%" stop-color="#8a8a9a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <!-- Hammer handle -->
  <rect x="238" y="210" width="36" height="210" rx="8" fill="#c4956a" transform="rotate(-15,256,256)"/>
  <rect x="238" y="210" width="36" height="210" rx="8" fill="#a0764f" transform="rotate(-15,256,256)" opacity="0.4"/>
  <!-- Hammer head -->
  <rect x="140" y="150" width="200" height="70" rx="10" fill="url(#head)" transform="rotate(-15,256,256)"/>
  <rect x="140" y="150" width="200" height="12" rx="4" fill="#fff" transform="rotate(-15,256,256)" opacity="0.2"/>
  <!-- Hammer striking face -->
  <rect x="120" y="155" width="30" height="60" rx="6" fill="#6a6a7a" transform="rotate(-15,256,256)"/>
  <!-- Gold accent line -->
  <rect x="150" y="170" width="180" height="4" rx="2" fill="#f5c842" transform="rotate(-15,256,256)" opacity="0.6"/>
  <!-- SF text -->
  <text x="256" y="420" font-family="Bebas Neue, sans-serif" font-size="80" font-weight="bold" fill="#f5c842" text-anchor="middle" letter-spacing="6" opacity="0.9">SHIFTFORGE</text>
</svg>
